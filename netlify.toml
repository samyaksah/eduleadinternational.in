  status = 301

[[redirects]]
  from = "/cambridge-international-certificate-diploma-in-educational-leadership/"
  to = "/educational-leadership.html"
  status = 301

[[redirects]]
  from = "/cpd-online-programme/"
  to = "/cpd-online.html"
  status = 301

[[redirects]]
  from = "/certified-training-programmes-2/"
  to = "/certified-training.html"
  status = 301

[[redirects]]
  from = "/distinction-holder/"
  to = "/results.html"
  status = 301

[[redirects]]
  from = "/gallery/"
  to = "/gallery.html"
  status = 301

[[redirects]]
  from = "/testimonials/"
  to = "/#written-testimonials"
  status = 301

[[redirects]]
  from = "/contact-us/"
  to = "/contact.html"
  status = 301

[[redirects]]
  from = "/trainers/"
  to = "/about.html"
  status = 301

[[redirects]]
  from = "/rupa-chakravarty-qea/"
  to = "/about.html"
  status = 301

[[redirects]]
  from = "/news-and-event/"
  to = "/gallery.html"
  status = 301

[[redirects]]
  from = "/newwebsite/wp-content/pdfuploads/cidel.pdf"
  to = "/educational-leadership.html"
  status = 301

[[redirects]]
  from = "/newwebsite/wp-content/pdfuploads/Edulead_International_Certificate_in_Educational_Leadership.pdf"
  to = "/educational-leadership.html"
  status = 301

[[redirects]]
  from = "/newwebsite/wp-content/pdfuploads/CIDTL_2025.pdf"
  to = "/teaching-learning.html"
  status = 301

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/api/instagram"
  to = "/.netlify/functions/instagram"
  status = 200

[[redirects]]
  from = "/api/results"
  to = "/.netlify/functions/results"
  status = 200

[[redirects]]
  from = "/api/commencements"
  to = "/.netlify/functions/commencements"
  status = 200

[[redirects]]
  from = "/api/gallery"
  to = "/.netlify/functions/gallery"
  status = 200

[[redirects]]
  from = "/api/testimonials"
  to = "/.netlify/functions/testimonials"
  status = 200

[[redirects]]
  from = "/api/brochures"
  to = "/.netlify/functions/brochures"
  status = 200

[[redirects]]
  from = "/api/supabase-config"
  to = "/.netlify/functions/supabase-config"
  status = 200

[[headers]]
  for = "/admin.html"
  [headers.values]
    Cache-Control = "no-store"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self'; img-src 'self' data: https://*.supabase.co; media-src 'self' blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    Referrer-Policy = "no-referrer"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/admin"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/api/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/thank-you.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/404.html"
  [headers.values]
    X-Robots-Tag = "noindex, follow"

[[headers]]
  for = "/testimonials.html"
  [headers.values]
    X-Robots-Tag = "noindex, follow"
